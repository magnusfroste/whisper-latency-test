services:
  whisper-vllm:
    build:
      context: .
      dockerfile: Dockerfile.whisper-vllm
    restart: unless-stopped
    runtime: nvidia
    ipc: host
    shm_size: '8gb'
    environment:
      - HUGGINGFACE_TOKEN=${HF_TOKEN}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - VLLM_NO_USAGE_STATS=1
      - NVIDIA_VISIBLE_DEVICES=all
    volumes:
      - /home/ss/.cache/huggingface:/root/.cache/huggingface
    ports:
      - "8001:8001"
    command: >
      openai/whisper-large-v3
      --port 8001
      --served-model-name openai/whisper-large-v3
      --gpu-memory-utilization 0.45
      --max-num-seqs 8
      --swap-space 4
      --enforce-eager

  whisper-test:
    build: .
    restart: unless-stopped
    environment:
      - WHISPER_URL=http://whisper-vllm:8001
    ports:
      - "3000:3000"
    depends_on:
      - whisper-vllm
