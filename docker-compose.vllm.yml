version: '3.8'

services:
  whisper-vllm:
    build:
      context: .
      dockerfile: Dockerfile.whisper-vllm
    container_name: whisper-large-v3
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ '0' ]
              capabilities: [ gpu ]
    volumes:
      - /home/ss/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HUGGINGFACE_TOKEN=${HF_TOKEN:-}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
      - NCCL_P2P_DISABLE=0
      - NCCL_IB_DISABLE=1
      - NCCL_P2P_LEVEL=PXB
      - NCCL_SOCKET_IFNAME=lo
      - NCCL_NSLS_ENABLE=1
      - NCCL_GRAPH_MIX_PRECISION=1
      - NCCL_MIN_NRINGS=4
      - NCCL_BUFFSIZE=4194304
      - NCCL_ALGO=Ring
      - PYTORCH_ALLOC_CONF=expandable_segments:True,max_split_size_mb:512
      - OMP_NUM_THREADS=16
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - VLLM_SLEEP_WHEN_IDLE=1
      - VLLM_ATTENTION_BACKEND=FLASHINFER
      - VLLM_LOGGING_LEVEL=INFO
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    ports:
      - "8001:8000"
    ipc: host
    shm_size: '32gb'
    command: >
      openai/whisper-large-v3 --served-model-name whisper-large-v3 --host 0.0.0.0 --port 8000 --gpu-memory-utilization 0.20 --dtype auto --enforce-eager --max-model-len 448 --trust-remote-code --max-num-seqs 8 --swap-space 4

  ultravox-vllm:
    image: vllm/vllm-openai:latest
    container_name: ultravox-vllm
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: [ '0' ]
              capabilities: [ gpu ]
    volumes:
      - /home/ss/.cache/huggingface:/root/.cache/huggingface
    environment:
      - HUGGINGFACE_TOKEN=${HF_TOKEN:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - CUDA_DEVICE_ORDER=PCI_BUS_ID
    ports:
      - "8002:8000"
    ipc: host
    shm_size: '32gb'
    entrypoint: /bin/bash
    command: -c "pip install vllm[audio] && vllm serve fixie-ai/ultravox-v0_5-llama-3_1-8b --host 0.0.0.0 --trust-remote-code --dtype bfloat16 --max-model-len 4096 --enforce-eager --served-model-name ultravox --gpu-memory-utilization 0.60 --limit-mm-per-prompt '{\"audio\":1}'"

  kokoro-tts:
    image: ghcr.io/remsky/kokoro-fastapi-cpu:latest
    container_name: kokoro-tts
    restart: unless-stopped
    ports:
      - "8003:8880"
    environment:
      - DEVICE=cpu
      - ONNX_DEVICE=cpu

  piper-tts:
    build:
      context: .
      dockerfile: Dockerfile.piper
    container_name: piper-tts
    restart: unless-stopped
    ports:
      - "8004:8004"
